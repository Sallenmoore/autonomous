version: "3"

services:
  api:
    image: dmbuddy_api:latest
    build: 
      context: ./config
      dockerfile: api.Dockerfile
    working_dir: /var/app
    env_file: ./config/api.env
    container_name: api
    expose:
      - "5001"
    networks:
      - app_net
    volumes:
      - ./app/api:/var/app/
      - ./sharedlib:/var/app/sharedlib
    command: ["gunicorn", "app:create_app()", "-c/var/gunicorn.conf.py"]
  admin:
    image: dmbuddy_admin:latest
    build: 
      context: ./config
      dockerfile: admin.Dockerfile
    working_dir: /var/app
    env_file: ./config/admin.env
    container_name: admin
    expose:
      - "5000"
    networks:
      - app_net
    volumes:
      - ./app/admin:/var/app
      - ./sharedlib:/var/app/sharedlib
    command: ["gunicorn", "app:create_app()", "-c/var/gunicorn.conf.py"]
  server:
    image: nginx
    container_name: server
    networks:
      - app_net
    volumes:
      - ./app/admin/static:/srv/static
      - ./app/api/static/docs:/srv/static/docs
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "5000:80"
    depends_on:
      - admin

networks:
  app_net:

