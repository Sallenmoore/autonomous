version: "3"

services:
  api:
    image: api:latest
    build: 
      context: ./config
      dockerfile: api.Dockerfile
    working_dir: /var/app
    env_file: ./config/api.env
    container_name: api
    networks:
      - app_net
    volumes:
      - ../app/api:/var/app/
    command: ["gunicorn", "app:create_app()", "-c/var/gunicorn.conf.py"]
    ports:
     - "5001:5001" #this port is open for testing purposes only
  admin:
    image: admin:latest
    build: 
      context: ./config
      dockerfile: admin.Dockerfile
    working_dir: /var/app
    env_file: ./config/admin.env
    container_name: admin
    ports:
      - "5000:5000" #this port is open for testing purposes only
    networks:
      - app_net
    volumes:
      - ../app/admin:/var/app
    command: ["gunicorn", "app:create_app()", "-c/var/gunicorn.conf.py"]
  user:
    image: user:latest
    build: 
      context: ./config
      dockerfile: user.Dockerfile
    working_dir: /var/app
    env_file: ./config/user.env
    container_name: user
    ports:
      - "5002:5002" #this port is open for testing purposes only
    networks:
      - app_net
    volumes:
      - ../app/user:/var/app
    command: ["gunicorn", "app:create_app()", "-c/var/gunicorn.conf.py"]
  server:
    image: nginx
    container_name: server
    networks:
      - app_net
    volumes:
      - ../app/admin/static:/srv/static/admin
      - ../app/api/static:/srv/static/api
      - ../app/user/static:/srv/static/user
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - admin

networks:
  app_net:

