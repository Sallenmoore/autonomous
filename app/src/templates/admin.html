{% import 'macros.html' as macros %}
{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col s8">
            <h1>Players</h1>
            <a class="btn-floating btn-small waves-effect waves-light" onclick="$('#create_character').toggle()">
                <i class="material-icons">add</i>
            </a>
            <div class="row" style="display:none" id="create_character">
                <div class="col s12">
                    <form method="post" action="{{url_for('add_character')}}">
                        <div class="row">
                            <div class="input-field col s9">
                                <input placeholder="Full Name" name="ame" id="full_name" type="text">
                                <label for="full_name">Full Name</label>
                            </div>
                            <div class="col s3">
                                <select>
                                    <option value="" disabled selected>Choose a Class</option>
                                    {% for class in classes %}
                                        <option value="{{class}}">{{class}}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-field col s12">
                                <button class="btn waves-effect waves-light" type="submit" name="new_character">
                                    Create
                                    <i class="material-icons right">add</i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="row">
                <div class="col s8">
                    <ul class="collapsible">
                    {% for character in characters %}
                        <li>
                            <div class="collapsible-header"><i class="material-icons">perm_identity</i>{{character.name}}</div>
                            <div class="collapsible-body">
                                <span>Lorem ipsum dolor sit amet.</span>
                            </div>
                        </li>
                    {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
        <div class="col s4">
            <h1>Reference</h1>
            <p class="important">
            Welcome to my awesome homepage.
            </p>
        </div>
    </div>
    <div class="row">
        <div class="col s12">
            <h1>Campaign</h1>
        </div>
    </div>
</div>
{% endblock %}
