{##############################################################################}
{##                          general search snippet                          ##}
{##############################################################################}
{% macro search() -%}
<div class="section">
    <div class="row">
        <div class="col s12">
            <div class="row">
                <div class="valign-wrapper">
                    <div class="col s12">
                        <h1>Reference</h1>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col s12">
                    <form id="general_search" method="get">
                        <div class="input-field col s4">
                            <select id="endpoint" name="endpoint">
                                <option value="search" selected > General Search</option>
                                <option value="character">Character</option>
                                <option value="monster">Monster</option>
                                <option value="item">Item</option>
                                <option value="spell">Spell</option>
                                <option value="classes_list">Classes</option>
                            </select>
                            <label>Topic</label>
                        </div>
                        <div class="input-field col s8">
                            <input id="search" name="name" type="text">
                            <label for="first_name">Search</label>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="row" id="auto_search_results">
    </div>
</div>
<div class="divider"></div>
{% endmacro %}
