{% macro dice_roll(damage) -%}
  <form class="dice_roll" method="post">
    <input
      type="hidden"
      value="{{damage}}"
      name="damage_dice"
    />
    <button
      class="btn-large waves-effect waves-light"
      type="submit"
      name="submit"
    >
      <i class="large material-icons">casino</i> ROLL
    </button>
  </form>
{%- endmacro %}
