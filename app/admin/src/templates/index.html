{% import 'macros.html' as macros %}
{% extends "base.html" %}

{% block content %}
<div class="row" id='dm'>
    <div class="col s12">
        <div class="row">
            <div class="col s3">
                <p class="subtitle">Reference</p>
                <div class="row">
                    <div class="input-field col s6">
                        <i class="material-icons prefix">search</i>
                        <input id="reference_search" name="search_term" type="text">
                        <label for="reference_search">Search...</label>
                    </div>
                </div>
                <div class="row">
                    <div class="col" id="search_results">
                        
                    </div>
                </div>
            </div>
            <div class="col s6">
                <p class="subtitle">Story</p>
            </div>
            <div class="col s3">
                <p class="subtitle">Party</p>
                {{ macros.character_list(characters) }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
