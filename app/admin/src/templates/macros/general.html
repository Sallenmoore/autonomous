{##############################################################################}
{##                          general search snippet                          ##}
{##############################################################################}
{% macro search() -%}
<div class="row">
  <div class="col s12">
      <h1>Reference</h1>
      <form id="general_search" method="get" action="{{url_for('compendium')}}">
          <div class="input-field col s6">
              <select name="endpoint">
                <option value="search" selected > General Search</option>
                <option value="character">Character</option>
                <option value="monster">Monster</option>
                <option value="item">Item</option>
                <option value="spell">Spell</option>
                <option value="classes_list">Classes</option>
              </select>
              <label>Topic</label>
          </div>
          <div class="input-field col s6">
              <input placeholder="search terms" name="search" type="text">
              <label for="first_name">Search</label>
          </div>
      </form>
  </div>
</div>
<div class="row" id="search_results" style="display:none;">
  result tbd
</div>
{% endmacro %}
